name: Sync Upstream & Deploy

on:
  schedule:
    - cron: '0 0 * * 1' # 每周一 UTC 00:00 自动同步
  workflow_dispatch: # 支持手动触发

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream
          BEFORE=$(git rev-parse HEAD)
          git merge upstream/main --no-edit
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
            git push
          else
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "Already up to date, skipping deploy."
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.sync.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name edgetunnel --branch main
